name: StreamVault Process

# ── Secrets obrigatórios (Settings → Secrets → Actions) ───────────────────
# CHACHA_KEY            — 32 bytes hex (mesmo do server.js)
# CDN_DOMAIN            — ex: https://cdn.pixgo.qzz.io
# PIPELINE_API          — URL da API EdgeOne
# ADMIN_API_KEY         — chave X-API-Key para PIPELINE_API
# STORAGE_GITHUB_TOKEN  — PAT da conta storage (scope: repo)
# STORAGE_GITHUB_OWNER  — username da conta storage
# STORAGE_GITHUB_REPO   — repo da conta storage
# CLOUDFLARE_TUNNEL_TOKEN — token do tunnel cloudflared

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID (tag da Release)'
        required: true
      video_url:
        description: 'URL do vídeo — HTTP(S), magnet:, .torrent'
        required: false
        default: ''
      seg_duration:
        description: 'Duração segmento HLS (segundos)'
        required: false
        default: '4'
      max_encode_height:
        description: 'Altura máxima encode'
        required: false
        default: '720'
      warm_concurrency:
        description: 'Concorrência do warm'
        required: false
        default: '8'
      metadata:
        description: 'JSON: { contentId, title, description, type, year, lang }'
        required: false
        default: '{}'
      thumbnail_url:
        description: 'URL da thumbnail (JPG/PNG) — vazio = gera 1 frame a ~7% do vídeo'
        required: false
        default: ''

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    env:
      WORK_DIR:      /tmp/sv_work/${{ inputs.job_id }}
      CHACHA_KEY:    ${{ secrets.CHACHA_KEY }}
      CDN_DOMAIN:    ${{ secrets.CDN_DOMAIN }}
      PIPELINE_API:  ${{ secrets.PIPELINE_API }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

    steps:

      # ── 0. Preparar dirs + servidor HTTP + tunnel ──────────────────────────
      - name: Preparar ambiente
        run: |
          mkdir -p $WORK_DIR/incoming $WORK_DIR/hls $WORK_DIR/thumbs
          echo "JOB_ID=${{ inputs.job_id }}"             >> $GITHUB_ENV
          echo "SEG_DURATION=${{ inputs.seg_duration }}" >> $GITHUB_ENV
          echo "MAX_H=${{ inputs.max_encode_height }}"   >> $GITHUB_ENV
          echo "WARM_C=${{ inputs.warm_concurrency }}"   >> $GITHUB_ENV
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          # Servidor HTTP
          printf '%s\n' \
            'import http.server, os' \
            '' \
            'class CacheHandler(http.server.SimpleHTTPRequestHandler):' \
            '  def __init__(self, *a, **kw):' \
            '    super().__init__(*a, directory="/tmp/sv_work", **kw)' \
            '  def end_headers(self):' \
            '    self.send_header("Cache-Control", "public, max-age=31536000, immutable")' \
            '    self.send_header("Access-Control-Allow-Origin", "*")' \
            '    super().end_headers()' \
            '  def log_message(self, *a): pass' \
            '' \
            'http.server.HTTPServer(("", 8080), CacheHandler).serve_forever()' \
            > /tmp/http_server.py
          python3 /tmp/http_server.py &
          echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
          mkdir -p ~/.cloudflared
          CDN_HOST=$(echo "${{ secrets.CDN_DOMAIN }}" | sed 's|https\?://||')
          cat > ~/.cloudflared/config.yml << EOF
          ingress:
            - hostname: ${CDN_HOST}
              service: http://localhost:8080
            - service: http_status:404
          EOF
          cloudflared tunnel --no-autoupdate \
            --config ~/.cloudflared/config.yml \
            run --token "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" &
          echo "TUNNEL_PID=$!" >> $GITHUB_ENV
          echo "Aguardando tunnel..."
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ secrets.CDN_DOMAIN }}/" 2>/dev/null || echo "000")
            echo "  Tentativa $i: HTTP $STATUS"
            if [ "$STATUS" != "000" ] && [ "$STATUS" != "503" ] && [ "$STATUS" != "502" ]; then
              echo "✓ Tunnel pronto (HTTP $STATUS)"
              break
            fi
            sleep 3
          done

      # ── 1. Instalar FFmpeg ─────────────────────────────────────────────────
      - name: Instalar FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      # ── 2. Instalar dependências Python + libtorrent ───────────────────────
      - name: Instalar dependências
        run: |
          pip install --quiet --upgrade cryptography
          # python3-libtorrent não existe no PyPI — instalar via apt (pacote oficial Ubuntu)
          sudo apt-get install -y --no-install-recommends python3-libtorrent
          # Verificar instalação
          python3 -c "import libtorrent as lt; print(f'✓ libtorrent {lt.version}')"

      # ── 3. Obter vídeo ─────────────────────────────────────────────────────
      - name: '[Modo A] Descarregar vídeo'
        if: ${{ inputs.video_url != '' }}
        run: |
          URL="${{ inputs.video_url }}"
          if [[ "$URL" == magnet:* ]] || [[ "$URL" == *.torrent ]] || [[ "$URL" == *infohash:* ]]; then
            echo "→ Modo torrent (libtorrent Python — engine do torrra)"
            python3 << 'PYEOF'
          import libtorrent as lt
          import os, sys, time, pathlib

          url      = os.environ['video_url_env']
          dest_dir = os.environ['WORK_DIR'] + '/incoming'
          MAX_WAIT = 3600

          ses = lt.session({
            'listen_interfaces': '0.0.0.0:6881',
            'alert_mask': lt.alert.category_t.status_notification |
                          lt.alert.category_t.error_notification,
          })
          ses.apply_settings({
            'connections_limit':         200,
            'active_downloads':          1,
            'active_seeds':              0,
            'seed_time_limit':           0,
            'share_ratio_limit':         0,
            'seeding_time_ratio_limit':  0,
          })

          params = lt.add_torrent_params()
          params.save_path = dest_dir

          if url.startswith('magnet:') or 'infohash:' in url:
            params = lt.parse_magnet_uri(url)
            params.save_path = dest_dir
            print(f"  Adicionando magnet: {url[:80]}...")
          else:
            import urllib.request
            torrent_path = '/tmp/input.torrent'
            print(f"  Descarregando .torrent de: {url}")
            urllib.request.urlretrieve(url, torrent_path)
            info = lt.torrent_info(torrent_path)
            params.ti = info
            print(f"  Torrent: {info.name()} ({info.total_size() // (1024*1024)} MB)")

          handle = ses.add_torrent(params)
          handle.set_sequential_download(True)

          print(f"  Destino: {dest_dir}")
          last_pct = -1
          start_t  = time.time()
          stall_t  = time.time()
          stall_bytes = 0

          while True:
            s = handle.status()
            pct = int(s.progress * 100)
            if pct != last_pct:
              dl_kb   = s.download_rate // 1024
              peers   = s.num_peers
              elapsed = int(time.time() - start_t)
              print(f"  [{elapsed:4d}s] {pct:3d}% | {dl_kb:6d} KB/s | peers: {peers}")
              last_pct = pct
            current_bytes = int(s.progress * (s.total_wanted or 1))
            if current_bytes > stall_bytes:
              stall_bytes = current_bytes
              stall_t     = time.time()
            elif s.num_peers > 0 and (time.time() - stall_t) > 300:
              print('⚠ Sem progresso por 5 min — continuando...')
              stall_t = time.time()
            if s.is_seeding or s.progress >= 1.0:
              print(f"✓ Download completo ({int(time.time()-start_t)}s)")
              break
            if (time.time() - start_t) > MAX_WAIT:
              print(f'⚠ Timeout após {MAX_WAIT}s — progresso: {pct}%')
              if pct == 0: sys.exit(1)
              if pct < 50: sys.exit(1)
              print('  Download parcial (>50%) — continuando...')
              break
            ses.wait_for_alert(1000)

          ses.remove_torrent(handle, 0)
          files = list(pathlib.Path(dest_dir).rglob('*'))
          video_exts = {'.mp4','.mkv','.avi','.mov','.wmv','.flv','.ts','.m4v','.webm','.mpg','.mpeg'}
          videos = [f for f in files if f.suffix.lower() in video_exts]
          print(f"  Ficheiros descarregados: {len(files)}")
          for v in videos:
            print(f"  → Vídeo: {v} ({v.stat().st_size // (1024*1024)} MB)")
          if not videos:
            print('⚠ Nenhum vídeo encontrado no torrent')
            for f in files:
              print(f'  {f} ({f.stat().st_size} bytes)')
          PYEOF
          else
            echo "→ Modo URL directa (curl)"
            curl -L --retry 3 --retry-delay 5 --progress-bar --fail \
              -o "$WORK_DIR/incoming/input.video" \
              "$URL"
            SIZE=$(stat -c%s "$WORK_DIR/incoming/input.video" 2>/dev/null || echo 0)
            echo "✓ Download: $(du -sh $WORK_DIR/incoming/input.video | cut -f1) ($SIZE bytes)"
            if [ "$SIZE" -lt 10000 ]; then
              echo "⚠ Ficheiro demasiado pequeno — download falhou"
              cat "$WORK_DIR/incoming/input.video" || true
              exit 1
            fi
          fi
        env:
          video_url_env: ${{ inputs.video_url }}

      - name: '[Modo B] Obter vídeo via Artifact'
        if: ${{ inputs.video_url == '' }}
        uses: actions/download-artifact@v4
        with:
          name: video-${{ inputs.job_id }}
          path: ${{ env.WORK_DIR }}/incoming/

      - name: Detectar ficheiro de vídeo
        run: |
          VIDEO_EXTS="mp4 mkv avi mov wmv flv ts m4v webm mpg mpeg video"
          VIDEO_PATH=""
          for ext in $VIDEO_EXTS; do
            FOUND=$(find "$WORK_DIR/incoming/" -iname "*.${ext}" | head -1)
            if [ -n "$FOUND" ]; then VIDEO_PATH="$FOUND"; break; fi
          done
          if [ -z "$VIDEO_PATH" ]; then
            echo "ERRO: nenhum vídeo encontrado"; ls -la "$WORK_DIR/incoming/"; exit 1
          fi
          echo "VIDEO_PATH=$VIDEO_PATH" >> $GITHUB_ENV
          echo "Vídeo: $VIDEO_PATH ($(du -sh "$VIDEO_PATH" | cut -f1))"

      # ── 4. Probe ───────────────────────────────────────────────────────────
      - name: Probe do vídeo
        run: |
          ffprobe -v quiet -print_format json \
            -show_streams -show_format "$VIDEO_PATH" \
            > "$WORK_DIR/probe.json"
          python3 << 'PYEOF'
          import json, os
          d   = json.load(open(os.environ['WORK_DIR'] + '/probe.json'))
          vs  = next((s for s in d['streams'] if s['codec_type'] == 'video'), {})
          fmt = d['format']
          num, den = map(int, vs.get('r_frame_rate','24/1').split('/'))
          fps = num / den if den else num
          codec_tag = 'avc1.640028'
          src_codec = vs.get('codec_name', 'unknown')
          probe = {
            'duration':  float(fmt.get('duration', 0)),
            'width':     vs.get('width',  1920),
            'height':    vs.get('height', 1080),
            'codec':     src_codec,
            'codec_tag': codec_tag,
            'fps':       fps,
            'bitrate':   int(fmt.get('bit_rate', 0)),
            'size':      int(fmt.get('size', 0)),
          }
          json.dump(probe, open(os.environ['WORK_DIR'] + '/probe_parsed.json','w'))
          max_h      = int(os.environ['MAX_H'])
          eff_h      = min(probe['height'], max_h)
          will_scale = probe['height'] > max_h
          if will_scale:
            eff_w = round((probe['width'] / probe['height']) * eff_h / 2) * 2
          else:
            eff_w = probe['width']
          h = eff_h
          label = ('4k'    if h>=2160 else
                   '1440p' if h>=1440 else
                   '1080p' if h>=1080 else
                   '720p'  if h>=720  else
                   '480p'  if h>=480  else
                   '360p'  if h>=360  else f'{h}p')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
            f.write(f"PROBE_DURATION={probe['duration']}\n")
            f.write(f"PROBE_WIDTH={probe['width']}\n")
            f.write(f"PROBE_HEIGHT={probe['height']}\n")
            f.write(f"PROBE_CODEC={probe['codec']}\n")
            f.write(f"PROBE_FPS={fps}\n")
            f.write(f"PROBE_BITRATE={probe['bitrate']}\n")
            f.write(f"EFF_HEIGHT={eff_h}\n")
            f.write(f"EFF_WIDTH={eff_w}\n")
            f.write(f"WILL_SCALE={'true' if will_scale else 'false'}\n")
            f.write(f"QUALITY_LABEL={label}\n")
          needs_transcode = src_codec not in ('h264', 'avc', 'avc1')
          print(f"✓ {probe['width']}x{probe['height']} | codec entrada: {src_codec} | {fps:.2f}fps | {probe['duration']:.1f}s")
          print(f"  → encode {eff_w}x{eff_h} ({label}) | rescale: {will_scale} | transcode necessário: {needs_transcode}")
          PYEOF

      # ── 5. HLS encode — fMP4 ──────────────────────────────────────────────
      - name: HLS encode (fMP4 + libx264 superfast CRF26 + AAC 128k)
        run: |
          HLS_DIR="$WORK_DIR/hls"
          if [ "$WILL_SCALE" = "true" ]; then
            SCALE_ARGS="-vf scale=-2:${EFF_HEIGHT}"
          else
            SCALE_ARGS=""
          fi
          GOP=$(python3 -c "import math; print(int(math.ceil(${PROBE_FPS} * ${SEG_DURATION})))")
          echo "  GOP=$GOP frames (${PROBE_FPS}fps × ${SEG_DURATION}s)"
          echo "  Re-encode para h264 (codec entrada: ${PROBE_CODEC}) — compatibilidade universal"
          (while true; do
            curl -sf http://localhost:8080/ -o /dev/null 2>/dev/null || true
            sleep 30
          done) &
          KEEPALIVE_PID=$!
          ffmpeg -hide_banner -loglevel warning -stats \
            -i "$VIDEO_PATH" \
            $SCALE_ARGS \
            -c:v libx264 -preset superfast -crf 26 -tune fastdecode \
            -profile:v high -level 4.0 \
            -pix_fmt yuv420p \
            -g $GOP -keyint_min ${SEG_DURATION} \
            -c:a aac -b:a 128k -ac 2 \
            -f hls \
            -hls_time ${SEG_DURATION} \
            -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "init.mp4" \
            -hls_flags independent_segments \
            -hls_segment_filename "$HLS_DIR/seg%05d.m4s" \
            -y "$HLS_DIR/index.m3u8"
          kill "$KEEPALIVE_PID" 2>/dev/null || true
          echo "✓ $(ls $HLS_DIR/*.m4s | wc -l) segmentos .m4s gerados (fMP4 h264)"
          echo "✓ init.mp4: $(du -sh $HLS_DIR/init.mp4 | cut -f1)"

      # ── 6. Thumbnails ──────────────────────────────────────────────────────
      # FIX: adicionada linha de debug para confirmar que INPUT_THUMBNAIL_URL chegou.
      # Requer também que o dispatcher.js passe thumbnail_url nos inputs (já corrigido).
      - name: Obter thumbnails
        env:
          INPUT_THUMBNAIL_URL: ${{ inputs.thumbnail_url }}
        run: |
          python3 << 'PYEOF'
          import subprocess, os, json

          thumb_dir = os.environ['WORK_DIR'] + '/thumbs'
          duration  = float(os.environ['PROBE_DURATION'])
          video     = os.environ['VIDEO_PATH']
          thumb_url = os.environ.get('INPUT_THUMBNAIL_URL', '').strip()
          thumbs    = []

          # DEBUG: confirmar que o valor chegou
          if thumb_url:
            print(f"  INPUT_THUMBNAIL_URL = '{thumb_url}'")
          else:
            print("  INPUT_THUMBNAIL_URL = (vazio — extraindo frame)")

          def is_valid_image(path, min_bytes=5000):
            if not os.path.exists(path):
              return False
            size = os.path.getsize(path)
            if size < min_bytes:
              return False
            with open(path, 'rb') as f:
              header = f.read(12)
            return header[:3] == b'\xff\xd8\xff' or header[:4] == b'\x89PNG'

          def extract_frame(video, out_path, time_pct=0.07):
            t = max(1.0, duration * time_pct)
            r = subprocess.run([
              'ffmpeg', '-hide_banner', '-loglevel', 'error',
              '-ss', f'{t:.2f}', '-i', video,
              '-vframes', '1',
              '-vf', 'scale=1280:-2',
              '-q:v', '2',
              '-y', out_path,
            ], capture_output=True)
            return r.returncode == 0 and is_valid_image(out_path)

          if thumb_url:
            out = f"{thumb_dir}/thumb_0.jpg"
            print(f"  Descarregando thumbnail: {thumb_url}")
            r = subprocess.run([
              'curl', '-L', '--retry', '5', '--retry-delay', '3',
              '--max-time', '60',
              '-H', 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              '-H', 'Accept: image/avif,image/webp,image/apng,image/*,*/*;q=0.8',
              '-H', 'Accept-Language: pt-BR,pt;q=0.9,en;q=0.8',
              '-H', 'Sec-Fetch-Dest: image',
              '-H', 'Sec-Fetch-Mode: no-cors',
              '-H', 'Sec-Fetch-Site: cross-site',
              '-o', out, thumb_url,
            ], capture_output=True)
            if not is_valid_image(out):
              if os.path.exists(out):
                os.remove(out)
              r2 = subprocess.run([
                'wget', '--timeout=30', '--tries=5',
                '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
                '-O', out, thumb_url,
              ], capture_output=True)
            if is_valid_image(out):
              norm = f"{thumb_dir}/thumb_0_norm.jpg"
              subprocess.run([
                'ffmpeg', '-hide_banner', '-loglevel', 'error',
                '-i', out, '-vframes', '1', '-q:v', '2',
                '-vf', "scale='min(1280,iw)':-2",
                '-y', norm,
              ], capture_output=True)
              if is_valid_image(norm):
                os.replace(norm, out)
              thumbs.append({'path': out, 'time': 0, 'index': 0})
              size_kb = os.path.getsize(out) // 1024
              print(f"✓ Thumbnail descarregada e válida ({size_kb} KB): {thumb_url}")
            else:
              if os.path.exists(out):
                os.remove(out)
              print(f"⚠ Thumbnail inválida ou inacessível ({thumb_url}) — extraindo frame do vídeo")
              if extract_frame(video, out):
                thumbs.append({'path': out, 'time': 0, 'index': 0})
                print(f"✓ Frame extraído como fallback: {os.path.getsize(out)//1024} KB")
              else:
                print('✗ Falha ao extrair frame de fallback')
          else:
            out = f"{thumb_dir}/thumb_0.jpg"
            print(f"  Nenhuma thumbnail_url fornecida — extraindo 1 frame a 7% ({duration*0.07:.1f}s)")
            if extract_frame(video, out, time_pct=0.07):
              thumbs.append({'path': out, 'time': duration * 0.07, 'index': 0})
              print(f"✓ Frame extraído: {os.path.getsize(out)//1024} KB")
            else:
              print(f"  ⚠ Frame a 7% falhou — tentando a 5%")
              if extract_frame(video, out, time_pct=0.05):
                thumbs.append({'path': out, 'time': duration * 0.05, 'index': 0})
                print(f"✓ Frame extraído a 5%: {os.path.getsize(out)//1024} KB")
              else:
                print('✗ Não foi possível extrair nenhum frame')

          json.dump(thumbs, open(os.environ['WORK_DIR'] + '/thumbs_manifest.json', 'w'))
          print(f"✓ {len(thumbs)} thumbnail(s) final(is)")
          PYEOF

      # ── 7. Encriptar init.mp4 + segmentos .m4s → .bin (chunk format v2) ───
      - name: Encriptar init.mp4 + segmentos .m4s → .bin
        run: |
          python3 << 'PYEOF'
          import os, json, secrets, struct
          from cryptography.hazmat.primitives.ciphers import Cipher, algorithms
          key_hex = os.environ['CHACHA_KEY']
          if len(key_hex) != 64:
            raise ValueError('CHACHA_KEY inválido')
          key     = bytes.fromhex(key_hex)
          hls_dir = os.environ['WORK_DIR'] + '/hls'
          CHUNK_SIZE = 65536
          def encrypt_segment(data, key):
            chunks = [data[i:i+CHUNK_SIZE] for i in range(0, len(data), CHUNK_SIZE)]
            out    = [struct.pack('<I', len(chunks))]
            for chunk in chunks:
              nonce       = secrets.token_bytes(12)
              nonce_field = struct.pack('<I', 1) + nonce
              ct          = Cipher(algorithms.ChaCha20(key, nonce_field), None).encryptor().update(chunk)
              out.append(nonce)
              out.append(struct.pack('<I', len(ct)))
              out.append(ct)
            return b''.join(out)
          nonce_map = {}
          init_src = os.path.join(hls_dir, 'init.mp4')
          init_dst = os.path.join(hls_dir, 'init.bin')
          if os.path.exists(init_src):
            with open(init_src, 'rb') as f:
              data = f.read()
            encrypted = encrypt_segment(data, key)
            with open(init_dst, 'wb') as f:
              f.write(encrypted)
            os.remove(init_src)
            n_chunks = struct.unpack('<I', encrypted[:4])[0]
            nonce_map['init.bin'] = f'chunked:{n_chunks}'
            print(f"  init.mp4 → init.bin ({len(data)//1024}KB → {n_chunks} chunks)")
          seg_files = sorted(f for f in os.listdir(hls_dir) if f.endswith('.m4s'))
          if not seg_files:
            raise RuntimeError('Nenhum .m4s encontrado')
          for fname in seg_files:
            src      = os.path.join(hls_dir, fname)
            bin_name = fname.replace('.m4s', '.bin')
            dst      = os.path.join(hls_dir, bin_name)
            with open(src, 'rb') as f:
              data = f.read()
            encrypted = encrypt_segment(data, key)
            with open(dst, 'wb') as f:
              f.write(encrypted)
            os.remove(src)
            n_chunks = struct.unpack('<I', encrypted[:4])[0]
            nonce_map[bin_name] = f'chunked:{n_chunks}'
            print(f"  {fname} → {bin_name} ({len(data)//1024}KB → {n_chunks} chunks)")
          out = {'key_id': os.environ['CHACHA_KEY'][:8], 'format': 'chunk-v2', 'nonces': nonce_map}
          json.dump(out, open(os.environ['WORK_DIR'] + '/nonces.json','w'))
          print(f"✓ {len(seg_files)} segmentos + init encriptados (chunk format v2, fMP4)")
          PYEOF

      # ── 8. Reescrever index.m3u8 com URLs CDN ─────────────────────────────
      - name: Reescrever index.m3u8 com URLs CDN
        run: |
          python3 << 'PYEOF'
          import re, os
          hls_dir  = os.environ['WORK_DIR'] + '/hls'
          cdn_base = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id   = os.environ['JOB_ID']
          with open(hls_dir + '/index.m3u8') as f:
            content = f.read()
          content = re.sub(
            r'#EXT-X-MAP:URI="init\.mp4"',
            f'#EXT-X-MAP:URI="{cdn_base}/{job_id}/hls/init.bin"',
            content
          )
          content = re.sub(
            r'^(seg\d+)\.m4s$',
            lambda m: f"{cdn_base}/{job_id}/hls/{m.group(1)}.bin",
            content, flags=re.MULTILINE
          )
          with open(hls_dir + '/index.m3u8', 'w') as f:
            f.write(content)
          print(f"✓ index.m3u8 reescrito (fMP4) → {cdn_base}/{job_id}/hls/")
          PYEOF

      # ── 9. Gerar master.m3u8 ───────────────────────────────────────────────
      - name: Gerar master.m3u8
        run: |
          python3 << 'PYEOF'
          import os, json
          cdn_base = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id   = os.environ['JOB_ID']
          work_dir = os.environ['WORK_DIR']
          eff_w    = os.environ['EFF_WIDTH']
          eff_h    = os.environ['EFF_HEIGHT']
          hls_dir   = work_dir + '/hls'
          bin_files = sorted(f for f in os.listdir(hls_dir) if f.endswith('.bin') and f != 'init.bin')
          if bin_files:
            total_bytes  = sum(os.path.getsize(os.path.join(hls_dir, f)) for f in bin_files)
            seg_dur      = int(os.environ['SEG_DURATION'])
            duration_s   = len(bin_files) * seg_dur
            real_bitrate = int((total_bytes * 8) / duration_s) if duration_s > 0 else 2000000
          else:
            real_bitrate = int(os.environ.get('PROBE_BITRATE') or 2000000)
          master = '\n'.join([
            '#EXTM3U',
            '#EXT-X-VERSION:6',
            '',
            f'#EXT-X-STREAM-INF:BANDWIDTH={real_bitrate},RESOLUTION={eff_w}x{eff_h}',
            f'{cdn_base}/{job_id}/hls/index.m3u8',
          ])
          with open(work_dir + '/master.m3u8', 'w') as f:
            f.write(master)
          print(f"✓ master.m3u8: {eff_w}x{eff_h} | {real_bitrate}bps real (EXT-X-VERSION:6 fMP4)")
          print(f"  → CDN: {cdn_base}/{job_id}/master.m3u8")
          PYEOF

      # ── 10. Criar Release e upload assets ──────────────────────────────────
      - name: Criar Release e upload assets
        id: upload_assets
        continue-on-error: true
        env:
          STORAGE_TOKEN: ${{ secrets.STORAGE_GITHUB_TOKEN }}
          STORAGE_OWNER: ${{ secrets.STORAGE_GITHUB_OWNER }}
          STORAGE_REPO:  ${{ secrets.STORAGE_GITHUB_REPO }}
          METADATA:      ${{ inputs.metadata }}
        run: |
          python3 << 'PYEOF'
          import os, subprocess, sys, json
          work_dir      = os.environ['WORK_DIR']
          storage_token = os.environ['STORAGE_TOKEN']
          storage_owner = os.environ['STORAGE_OWNER']
          storage_repo  = os.environ['STORAGE_REPO']
          job_id        = os.environ['JOB_ID']
          quality       = os.environ['QUALITY_LABEL']
          github_env    = os.environ['GITHUB_ENV']
          RELEASE_LIMIT = 1_500 * 1024 * 1024
          assets = []
          for fpath, mime in [
            (os.path.join(work_dir, 'master.m3u8'), 'application/vnd.apple.mpegurl'),
            (os.path.join(work_dir, 'hls', 'index.m3u8'), 'application/vnd.apple.mpegurl'),
            (os.path.join(work_dir, 'nonces.json'), 'application/json'),
          ]:
            if os.path.exists(fpath):
              assets.append((fpath, os.path.basename(fpath), mime))
          hls_dir = os.path.join(work_dir, 'hls')
          for f in sorted(f for f in os.listdir(hls_dir) if f.endswith('.bin')):
            assets.append((os.path.join(hls_dir, f), f, 'application/octet-stream'))
          thumb_dir = os.path.join(work_dir, 'thumbs')
          if os.path.isdir(thumb_dir):
            for f in sorted(f for f in os.listdir(thumb_dir) if f.endswith('.jpg')):
              assets.append((os.path.join(thumb_dir, f), f, 'image/jpeg'))
          total_bytes = sum(os.path.getsize(p) for p, _, _ in assets)
          total_mb    = total_bytes / (1024 * 1024)
          limit_mb    = RELEASE_LIMIT / (1024 * 1024)
          print(f"  Total assets: {len(assets)} ficheiros | {total_mb:.1f} MB (limite: {limit_mb:.0f} MB)")
          if total_bytes > RELEASE_LIMIT:
            print(f"  ⚠ {total_mb:.0f} MB > {limit_mb:.0f} MB — upload ignorado")
            print(f"  → conteúdo servido exclusivamente pelo cache Cloudflare")
            with open(github_env, 'a') as f:
              f.write("UPLOAD_SKIP=true\n")
            sys.exit(0)
          try:
            meta = json.loads(os.environ.get('METADATA', '{}'))
          except Exception:
            meta = {}
          title = meta.get('title', 'Untitled')
          r = subprocess.run([
            'curl', '-sf', '-X', 'POST',
            '-H', f'Authorization: Bearer {storage_token}',
            '-H', 'Accept: application/vnd.github+json',
            '-H', 'X-GitHub-Api-Version: 2022-11-28',
            f'https://api.github.com/repos/{storage_owner}/{storage_repo}/releases',
            '-d', json.dumps({
              'tag_name':   job_id,
              'name':       title,
              'body':       f'jobId={job_id} | quality={quality}',
              'draft':      False,
              'prerelease': False,
            }),
          ], capture_output=True, text=True)
          if r.returncode != 0:
            print(f"  ✗ Falha ao criar Release: {r.stderr.strip()}")
            with open(github_env, 'a') as f:
              f.write("UPLOAD_SKIP=true\n")
            sys.exit(0)
          upload_url = json.loads(r.stdout)['upload_url'].split('{')[0]
          print(f"  ✓ Release criada: tag={job_id}")
          ok = 0
          for file_path, asset_name, mime in assets:
            size_kb = os.path.getsize(file_path) // 1024
            r = subprocess.run([
              'curl', '-sf',
              '-o', '/dev/null', '-w', '%{http_code}',
              '-X', 'POST',
              '-H', f'Authorization: Bearer {storage_token}',
              '-H', f'Content-Type: {mime}',
              '--max-time', '120',
              f'{upload_url}?name={asset_name}',
              '--data-binary', f'@{file_path}',
            ], capture_output=True, text=True)
            code = r.stdout.strip()
            if code == '201':
              print(f"  ✓ {asset_name} ({size_kb}KB)")
              ok += 1
            else:
              print(f"  ✗ {asset_name} HTTP {code} — abortando upload")
              with open(github_env, 'a') as f:
                f.write("UPLOAD_SKIP=true\n")
              sys.exit(0)
          print(f"  ✅ {ok}/{len(assets)} assets enviados")
          with open(github_env, 'a') as f:
            f.write("UPLOAD_SKIP=false\n")
          PYEOF

      # ── 11. Verificar tunnel e reiniciar se necessário ─────────────────────
      - name: Verificar e restaurar tunnel
        run: |
          echo "=== Estado do processo cloudflared ==="
          if ps -p "$TUNNEL_PID" > /dev/null 2>&1; then
            echo "✓ Tunnel PID $TUNNEL_PID ainda activo"
          else
            echo "⚠ Tunnel morto — a reiniciar..."
            cloudflared tunnel --no-autoupdate \
              --config ~/.cloudflared/config.yml \
              run --token "${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}" &
            NEW_PID=$!
            echo "TUNNEL_PID=$NEW_PID" >> $GITHUB_ENV
            echo "  Novo PID: $NEW_PID"
          fi
          echo ""
          echo "=== Teste servidor HTTP local porta 8080 ==="
          HTTP_LOCAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ 2>/dev/null || echo "000")
          echo "HTTP local: $HTTP_LOCAL"
          if [ "$HTTP_LOCAL" = "000" ]; then
            echo "⚠ Servidor HTTP morto — a reiniciar..."
            python3 /tmp/http_server.py &
            echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
          fi
          echo ""
          echo "=== Aguardar tunnel pronto para servir ==="
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$CDN_DOMAIN/$JOB_ID/master.m3u8" 2>/dev/null || echo "000")
            echo "  Tentativa $i: CDN HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "✓ Tunnel a responder (HTTP $STATUS)"
              break
            fi
            sleep 5
          done
          echo ""
          echo "=== Headers CDN (nonces.json) ==="
          curl -s -o /dev/null -D - \
            "$CDN_DOMAIN/$JOB_ID/nonces.json" \
            | grep -E "^HTTP|cf-cache-status|cf-ray|cache-control|server|content-type" \
            || echo "curl falhou"

      # ── 12. Warm ───────────────────────────────────────────────────────────
      - name: Aquecer Cloudflare Cache
        run: |
          python3 << 'PYEOF'
          import os, json, concurrent.futures, urllib.request as ur, time
          cdn_base  = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id    = os.environ['JOB_ID']
          warm_c    = int(os.environ['WARM_C'])
          work_dir  = os.environ['WORK_DIR']
          nonces = json.load(open(work_dir + '/nonces.json'))
          thumbs = json.load(open(work_dir + '/thumbs_manifest.json'))
          cdn_urls = (
            [
              f"{cdn_base}/{job_id}/master.m3u8",
              f"{cdn_base}/{job_id}/nonces.json",
              f"{cdn_base}/{job_id}/hls/index.m3u8",
              f"{cdn_base}/{job_id}/hls/init.bin",
            ] +
            [f"{cdn_base}/{job_id}/hls/{bn}" for bn in nonces['nonces'] if bn != 'init.bin'] +
            [f"{cdn_base}/{job_id}/thumbs/thumb_{i}.jpg" for i in range(len(thumbs))]
          )
          def fetch_url(url):
            try:
              with ur.urlopen(ur.Request(url), timeout=120) as r:
                body      = r.read()
                cf_status = r.headers.get('cf-cache-status', 'UNKNOWN')
                cc        = r.headers.get('cache-control', 'none')
                return {'url': url, 'status': cf_status, 'cc': cc, 'http': r.status, 'size': len(body)}
            except Exception as e:
              return {'url': url, 'status': 'ERROR', 'error': str(e)}
          def warm_pass(urls, label):
            hits=0; misses=0; errors=0; no_store=0
            with concurrent.futures.ThreadPoolExecutor(max_workers=warm_c) as ex:
              results = list(ex.map(fetch_url, urls))
            for r in results:
              if r['status'] == 'ERROR':
                errors += 1
                print(f"  ✗ ERROR: {r['url'].split('/')[-1]} — {r.get('error','')}")
              elif r['status'] == 'HIT':
                hits += 1
              else:
                misses += 1
                cc = r.get('cc', '')
                if 'no-store' in cc or 'private' in cc:
                  no_store += 1
                  if no_store <= 3:
                    print(f"  ⚠ sem cache público: {r['url'].split('/')[-1]} [{cc}]")
            print(f"✓ {label}: {misses} MISS | {hits} HIT | {errors} erros | {no_store} sem cache-control")
            return hits, misses, errors, no_store
          print(f"Aquecendo {len(cdn_urls)} URLs (concorrência {warm_c})...")
          hits1, misses1, errors1, ns1 = warm_pass(cdn_urls, '1ª passagem')
          if errors1 == len(cdn_urls):
            print("⚠ Todas as URLs falharam — verificar tunnel e ingress rule")
          else:
            if ns1 > 0:
              print(f"⚠ Origem sem Cache-Control público — Cloudflare não guarda")
            time.sleep(5)
            hits2, misses2, errors2, ns2 = warm_pass(cdn_urls, '2ª passagem')
            if hits2 == len(cdn_urls):
              print(f"✅ Cache aquecido — {hits2}/{len(cdn_urls)} HITs confirmados")
            elif hits2 > 0:
              print(f"⚠ Cache parcial — {hits2}/{len(cdn_urls)} HITs")
            else:
              print(f"✗ Cache não aqueceu — 0 HITs na 2ª passagem")
          json.dump(cdn_urls, open(work_dir + '/cdn_urls.json','w'))
          PYEOF

      # ── 13. Desligar tunnel ────────────────────────────────────────────────
      - name: Desligar Cloudflare Tunnel
        if: always()
        run: |
          [ -n "$TUNNEL_PID" ]      && kill "$TUNNEL_PID"      2>/dev/null || true
          [ -n "$HTTP_SERVER_PID" ] && kill "$HTTP_SERVER_PID" 2>/dev/null || true
          echo "✓ Tunnel e servidor HTTP desligados"

      # ── 14. Registar no EdgeOne ────────────────────────────────────────────
      # FIX: retry com backoff exponencial para lidar com cold start Render.
      # "Not connected" = servidor acordou mas ligação Turso/libsql ainda não está pronta.
      # Tentamos até 5 vezes com espera crescente: 5s → 10s → 20s → 40s.
      - name: Registar no EdgeOne (Turso + KV)
        env:
          METADATA: ${{ inputs.metadata }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, datetime, time

          pipeline_api = os.environ.get('PIPELINE_API','').rstrip('/')
          if not pipeline_api:
            print('⚠ PIPELINE_API não configurado — ignorado'); exit(0)

          work_dir  = os.environ['WORK_DIR']
          cdn_base  = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id    = os.environ['JOB_ID']
          quality   = os.environ['QUALITY_LABEL']
          seg_dur   = int(os.environ['SEG_DURATION'])
          eff_w     = int(os.environ['EFF_WIDTH'])
          eff_h     = int(os.environ['EFF_HEIGHT'])

          try:    metadata = json.loads(os.environ.get('METADATA','{}'))
          except: metadata = {}

          probe    = json.load(open(work_dir + '/probe_parsed.json'))
          nonces   = json.load(open(work_dir + '/nonces.json'))
          thumbs   = json.load(open(work_dir + '/thumbs_manifest.json'))
          cdn_urls = json.load(open(work_dir + '/cdn_urls.json'))

          content_id = metadata.get('contentId', job_id)
          seg_count  = len([k for k in nonces['nonces'] if k != 'init.bin'])
          thumb_urls = [f"{cdn_base}/{job_id}/thumbs/thumb_{i}.jpg" for i in range(len(thumbs))]

          body = {
            'contentId':    content_id,
            'title':        metadata.get('title','Untitled'),
            'description':  metadata.get('description',''),
            'type':         metadata.get('type','movie'),
            'year':         int(metadata.get('year') or datetime.datetime.now().year),
            'lang':         metadata.get('lang','en'),
            'duration':     round(probe['duration']),
            'thumbnail':    thumb_urls[0] if thumb_urls else '',
            'thumbnails':   thumb_urls,
            'qualities':    [quality],
            'width':        eff_w,
            'height':       eff_h,
            'codec':        'h264',
            'fps':          probe['fps'],
            'bitrate':      probe['bitrate'],
            'segmentCount': seg_count,
            'segDuration':  seg_dur,
            'videoID':      content_id,
            'cdnUrls':      cdn_urls,
            'encrypted':    True,
            'encryption':   'chacha20-chunk-v2',
            'container':    'fmp4',
            'segExt':       'bin',
            'masterUrl':    f"{cdn_base}/{job_id}/master.m3u8",
            'noncesUrl':    f"{cdn_base}/{job_id}/nonces.json",
          }

          payload = json.dumps(body).encode()

          # Retry com backoff exponencial — trata cold start Render + "Not connected" Turso
          MAX_ATTEMPTS = 5
          BACKOFF      = [5, 10, 20, 40]   # segundos entre tentativas

          for attempt in range(1, MAX_ATTEMPTS + 1):
            req = urllib.request.Request(
              f"{pipeline_api}/api/pipeline/register",
              data=payload,
              headers={
                'Content-Type': 'application/json',
                'X-API-Key':    os.environ.get('ADMIN_API_KEY',''),
              },
              method='POST'
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as r:
                print(f"✓ Conteúdo registado ({r.status}) na tentativa {attempt}")
                break
            except urllib.error.HTTPError as e:
              body_err = e.read().decode()[:300]
              print(f"⚠ Tentativa {attempt}/{MAX_ATTEMPTS} — HTTP {e.code}: {body_err}")
              # Erros de cliente (4xx, excepto 429) não melhoram com retry
              if e.code < 500 and e.code != 429:
                print(f"  Erro de cliente ({e.code}) — sem retry")
                break
            except Exception as e:
              print(f"⚠ Tentativa {attempt}/{MAX_ATTEMPTS} — {e}")

            if attempt < MAX_ATTEMPTS:
              wait = BACKOFF[attempt - 1]
              print(f"  Aguardando {wait}s antes da próxima tentativa...")
              time.sleep(wait)
            else:
              print(f"✗ Registo falhou após {MAX_ATTEMPTS} tentativas — verificar pipeline API")
          PYEOF

      # ── 15. Cleanup ────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: rm -rf "$WORK_DIR" && echo "✓ Workspace limpo"
