name: StreamVault Process

# ── Secrets obrigatórios (Settings → Secrets → Actions) ───────────────────
# CHACHA_KEY            — 32 bytes hex (mesmo do server.js)
# CDN_DOMAIN            — ex: https://cdn.pixgo.qzz.io
# PIPELINE_API          — URL base do servidor unificado (ex: https://alwaysdata.onrender.com)
# ADMIN_API_KEY         — chave X-API-Key para PIPELINE_API
# STORAGE_GITHUB_TOKEN  — PAT da conta storage (scope: repo)
# STORAGE_GITHUB_OWNER  — username da conta storage
# STORAGE_GITHUB_REPO   — repo da conta storage

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID (tag da Release)'
        required: true
      video_url:
        description: 'URL do vídeo — HTTP(S), magnet:, .torrent'
        required: false
        default: ''
      seg_duration:
        description: 'Duração segmento HLS (segundos)'
        required: false
        default: '4'
      max_encode_height:
        description: 'Altura máxima encode'
        required: false
        default: '720'
      warm_concurrency:
        description: 'Concorrência do warm'
        required: false
        default: '8'
      metadata:
        description: 'JSON: { contentId, title, description, type, year, lang }'
        required: false
        default: '{}'
      thumbnail_url:
        description: 'URL da thumbnail (JPG/PNG) — vazio = gera 1 frame a ~7% do vídeo'
        required: false
        default: ''
      season_number:
        description: 'Número da temporada (0 = filme/documentário)'
        required: false
        default: '0'
      episode_number:
        description: 'Número do episódio (0 = coordinator ou filme)'
        required: false
        default: '0'
      episode_title:
        description: 'Título do episódio (opcional)'
        required: false
        default: ''
      file_indices:
        description: 'Índices dos ficheiros no torrent a processar ex: 2,3,4 (vazio = coordinator ou ficheiro único)'
        required: false
        default: ''

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    env:
      WORK_DIR:      /tmp/sv_work/${{ inputs.job_id }}
      CHACHA_KEY:    ${{ secrets.CHACHA_KEY }}
      CDN_DOMAIN:    ${{ secrets.CDN_DOMAIN }}
      PIPELINE_API:  ${{ secrets.PIPELINE_API }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

    steps:

      # ── 0a. Preparar dirs ────────────────────────────────────────────────
      - name: Preparar ambiente
        run: |
          mkdir -p $WORK_DIR/incoming $WORK_DIR/hls $WORK_DIR/thumbs
          echo "JOB_ID=${{ inputs.job_id }}"             >> $GITHUB_ENV
          echo "SEG_DURATION=${{ inputs.seg_duration }}" >> $GITHUB_ENV
          echo "MAX_H=${{ inputs.max_encode_height }}"   >> $GITHUB_ENV

      # ── 1. Instalar FFmpeg ─────────────────────────────────────────────────
      - name: Instalar FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      # ── 2. Instalar dependências Python + libtorrent ───────────────────────
      - name: Instalar dependências
        run: |
          pip install --quiet --upgrade cryptography
          sudo apt-get install -y --no-install-recommends python3-libtorrent
          python3 -c "import libtorrent as lt; print(f'✓ libtorrent {lt.version}')"

      # ── 2b. Coordinator ────────────────────────────────────────────────────
      - name: '[Coordinator] Detectar episódios e disparar jobs filhos'
        if: |
          ${{
            inputs.video_url != '' &&
            inputs.file_indices == '' &&
            (
              contains(fromJson(inputs.metadata).type, 'series') ||
              contains(fromJson(inputs.metadata).type, 'anime')  ||
              contains(fromJson(inputs.metadata).type, 'dorama')
            ) &&
            (
              startsWith(inputs.video_url, 'magnet:') ||
              endsWith(inputs.video_url, '.torrent')  ||
              contains(inputs.video_url, 'infohash:')
            )
          }}
        env:
          INPUT_METADATA:  ${{ inputs.metadata }}
          INPUT_VIDEO_URL: ${{ inputs.video_url }}
          INPUT_THUMBNAIL: ${{ inputs.thumbnail_url }}
          INPUT_SEG:       ${{ inputs.seg_duration }}
          INPUT_HEIGHT:    ${{ inputs.max_encode_height }}
          INPUT_WARM:      ${{ inputs.warm_concurrency }}
          INPUT_SEASON:    ${{ inputs.season_number }}
        run: |
          python3 << 'PYEOF'
          import libtorrent as lt
          import os, sys, re, json, time, urllib.request, urllib.error

          url          = os.environ['INPUT_VIDEO_URL']
          metadata_raw = os.environ['INPUT_METADATA']
          season_num   = int(os.environ.get('INPUT_SEASON', '0') or '0')
          VIDEO_EXTS   = {'.mp4','.mkv','.avi','.mov','.wmv','.flv','.ts','.m4v','.webm','.mpg','.mpeg'}
          BATCH_LIMIT  = 1_400 * 1024 * 1024

          try:
            metadata = json.loads(metadata_raw)
          except Exception:
            metadata = {}

          content_id = metadata.get('contentId') or ''
          print(f"Coordinator: {metadata.get('title','?')} S{season_num:02d} | {url[:70]}...")

          ses = lt.session({'listen_interfaces': '0.0.0.0:6882'})
          try:
            ses.apply_settings({'connections_limit': 50, 'active_downloads': 1, 'active_seeds': 0})
          except Exception as e:
            print(f"  apply_settings parcial: {e}")

          os.makedirs('/tmp/coord_meta', exist_ok=True)

          if url.startswith('magnet:') or 'infohash:' in url:
            params = lt.parse_magnet_uri(url)
            params.save_path = '/tmp/coord_meta'
          else:
            torrent_path = '/tmp/coord.torrent'
            urllib.request.urlretrieve(url, torrent_path)
            ti = lt.torrent_info(torrent_path)
            params = lt.add_torrent_params()
            params.ti = ti
            params.save_path = '/tmp/coord_meta'

          params.flags = lt.torrent_flags.upload_mode | lt.torrent_flags.paused
          handle = ses.add_torrent(params)
          handle.resume()

          print("  Aguardando metadados...")
          t0 = time.time()
          while not handle.status().has_metadata:
            if time.time() - t0 > 120:
              print("ERRO: timeout metadados (120s)")
              ses.remove_torrent(handle)
              sys.exit(1)
            ses.wait_for_alert(1000)
            elapsed = int(time.time() - t0)
            if elapsed % 15 == 0 and elapsed > 0:
              st = handle.status()
              print(f"  ... {elapsed}s | peers: {st.num_peers}")

          info = handle.get_torrent_info()
          fs   = info.files()
          print(f"  Metadados OK: {info.name()} | {fs.num_files()} ficheiros | {info.total_size()//(1024*1024)} MB")
          ses.remove_torrent(handle)

          video_files = []
          for i in range(fs.num_files()):
            path = fs.file_path(i)
            size = fs.file_size(i)
            ext  = os.path.splitext(path)[1].lower()
            if ext in VIDEO_EXTS:
              video_files.append({'index': i, 'path': path, 'size': size, 'name': os.path.basename(path)})

          if not video_files:
            print("ERRO: nenhum ficheiro de vídeo nos metadados")
            sys.exit(1)

          print(f"  Vídeos encontrados: {len(video_files)}")

          def extract_ep(name):
            base = os.path.splitext(name)[0]
            patterns = [
              r'[Ss]\d+[Ee](\d+)',
              r'[Ee][Pp]?[\s._-]?(\d{1,3})',
              r'[\s._-](\d{2,3})[\s._-]',
              r'^(\d{1,3})[\s._-]',
              r'[\s._-](\d{1,3})\.',
            ]
            for pat in patterns:
              m = re.search(pat, base, re.IGNORECASE)
              if m:
                return int(m.group(1))
            return None

          for vf in video_files:
            vf['ep_num'] = extract_ep(vf['name'])

          video_files.sort(key=lambda x: (x['ep_num'] is None, x['ep_num'] or 0, x['name']))

          used_nums = {v['ep_num'] for v in video_files if v['ep_num'] is not None}
          counter   = 1
          for vf in video_files:
            if vf['ep_num'] is None:
              while counter in used_nums:
                counter += 1
              vf['ep_num'] = counter
              used_nums.add(counter)
              counter += 1

          for vf in video_files:
            print(f"  [{vf['index']:2d}] ep{vf['ep_num']:02d} | {vf['name']} | {vf['size']//(1024*1024)}MB")

          def est(size):
            return int(size * 0.55 * 1.17)

          batches, cur, cur_size = [], [], 0
          for vf in video_files:
            e = est(vf['size'])
            if cur and cur_size + e > BATCH_LIMIT:
              batches.append(cur)
              cur, cur_size = [vf], e
            else:
              cur.append(vf)
              cur_size += e
          if cur:
            batches.append(cur)

          print(f"  Batches: {len(batches)}")
          for i, b in enumerate(batches):
            print(f"    Batch {i+1}: eps {[v['ep_num'] for v in b]} | ~{sum(v['size'] for v in b)//(1024*1024)}MB raw")

          safe_cid   = re.sub(r'[^a-z0-9-]', '', (content_id or metadata.get('title','serie'))[:20].replace(' ','-').lower())
          dispatched = 0

          dispatcher_base = re.sub(r'/api/.*$', '', os.environ.get('PIPELINE_API','').rstrip('/'))
          admin_key       = os.environ.get('ADMIN_API_KEY', '')

          for bi, batch in enumerate(batches):
            indices_str = ','.join(str(v['index']) for v in batch)
            ep_numbers  = ','.join(str(v['ep_num']) for v in batch)
            first_ep    = batch[0]['ep_num']
            child_id    = f"{safe_cid}-s{season_num:02d}-ep{first_ep:02d}-b{bi+1}"
            child_meta  = {**metadata, 'contentId': content_id or safe_cid}

            payload = json.dumps({
              'job_id':            child_id,
              'video_url':         url,
              'thumbnail_url':     os.environ.get('INPUT_THUMBNAIL',''),
              'seg_duration':      os.environ.get('INPUT_SEG','4'),
              'max_encode_height': os.environ.get('INPUT_HEIGHT','720'),
              'warm_concurrency':  os.environ.get('INPUT_WARM','8'),
              'metadata':          child_meta,
              'season_number':     str(season_num),
              'episode_number':    ep_numbers,
              'episode_title':     '',
              'file_indices':      indices_str,
            }).encode()

            req = urllib.request.Request(
              f"{dispatcher_base}/dispatch",
              data=payload,
              headers={
                'Content-Type': 'application/json',
                'x-api-key':    admin_key,
                'User-Agent':   'StreamVault-Coordinator/3.0',
              },
              method='POST'
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as r:
                resp = json.loads(r.read().decode())
                pos  = resp.get('queue_position', 0)
                st   = resp.get('status', '?')
                print(f"  ✓ Batch {bi+1} → {child_id} ({st} fila #{pos+1})")
                dispatched += 1
            except urllib.error.HTTPError as e:
              print(f"  ✗ Batch {bi+1} HTTP {e.code}: {e.read().decode()[:200]}")
            except Exception as e:
              print(f"  ✗ Batch {bi+1} erro: {e}")

            if bi < len(batches) - 1:
              time.sleep(1)

          print(f"\n✅ Coordinator: {dispatched}/{len(batches)} jobs em fila FIFO")
          sys.exit(0)
          PYEOF

      # ── 3. Obter vídeo ─────────────────────────────────────────────────────
      - name: '[Modo A] Descarregar vídeo'
        if: ${{ inputs.video_url != '' }}
        run: |
          URL="${{ inputs.video_url }}"
          if [[ "$URL" == magnet:* ]] || [[ "$URL" == *.torrent ]] || [[ "$URL" == *infohash:* ]]; then
            echo "→ Modo torrent (libtorrent Python)"
            python3 << 'PYEOF'
          import libtorrent as lt
          import os, sys, time, pathlib

          url      = os.environ['video_url_env']
          dest_dir = os.environ['WORK_DIR'] + '/incoming'
          MAX_WAIT = 3600

          ses = lt.session({
            'listen_interfaces': '0.0.0.0:6881',
            'alert_mask': lt.alert.category_t.status_notification |
                          lt.alert.category_t.error_notification,
          })
          try:
            ses.apply_settings({
              'connections_limit': 200,
              'active_downloads':  1,
              'active_seeds':      0,
            })
          except Exception as e:
            print(f"⚠ apply_settings parcial: {e}")

          params = lt.add_torrent_params()
          params.save_path = dest_dir

          if url.startswith('magnet:') or 'infohash:' in url:
            params = lt.parse_magnet_uri(url)
            params.save_path = dest_dir
            print(f"  Adicionando magnet: {url[:80]}...")
          else:
            import urllib.request
            torrent_path = '/tmp/input.torrent'
            print(f"  Descarregando .torrent de: {url}")
            urllib.request.urlretrieve(url, torrent_path)
            info = lt.torrent_info(torrent_path)
            params.ti = info
            print(f"  Torrent: {info.name()} ({info.total_size() // (1024*1024)} MB)")

          handle = ses.add_torrent(params)
          handle.set_sequential_download(True)

          file_indices_raw = os.environ.get('FILE_INDICES_ENV', '').strip()
          if file_indices_raw:
            print(f"  Modo worker — aguardando metadados para definir prioridades...")
            t0_meta = time.time()
            while not handle.status().has_metadata:
              if time.time() - t0_meta > 60:
                print("  ⚠ Timeout metadados — continuando sem prioridades")
                break
              ses.wait_for_alert(500)
            if handle.status().has_metadata:
              info_w    = handle.get_torrent_info()
              num_files = info_w.files().num_files()
              wanted    = set(int(x) for x in file_indices_raw.split(',') if x.strip().isdigit())
              for fi in range(num_files):
                prio = 7 if fi in wanted else 0
                handle.file_priority(fi, prio)
              print(f"  Prioridades definidas: {sorted(wanted)} activos | {num_files - len(wanted)} ignorados")
            else:
              print("  ⚠ Sem metadados — descarregando tudo (fallback)")

          print(f"  Destino: {dest_dir}")
          last_pct    = -1
          start_t     = time.time()
          stall_t     = time.time()
          stall_bytes = 0

          while True:
            s   = handle.status()
            pct = int(s.progress * 100)
            if pct != last_pct:
              dl_kb   = s.download_rate // 1024
              peers   = s.num_peers
              elapsed = int(time.time() - start_t)
              print(f"  [{elapsed:4d}s] {pct:3d}% | {dl_kb:6d} KB/s | peers: {peers}")
              last_pct = pct
            current_bytes = int(s.progress * (s.total_wanted or 1))
            if current_bytes > stall_bytes:
              stall_bytes = current_bytes
              stall_t     = time.time()
            elif s.num_peers > 0 and (time.time() - stall_t) > 300:
              print('⚠ Sem progresso por 5 min — continuando...')
              stall_t = time.time()
            if s.is_seeding or s.progress >= 1.0:
              print(f"✓ Download completo ({int(time.time()-start_t)}s)")
              break
            if (time.time() - start_t) > MAX_WAIT:
              print(f'⚠ Timeout após {MAX_WAIT}s — progresso: {pct}%')
              if pct == 0: sys.exit(1)
              if pct < 50: sys.exit(1)
              print('  Download parcial (>50%) — continuando...')
              break
            ses.wait_for_alert(1000)

          ses.remove_torrent(handle, 0)
          files      = list(pathlib.Path(dest_dir).rglob('*'))
          video_exts = {'.mp4','.mkv','.avi','.mov','.wmv','.flv','.ts','.m4v','.webm','.mpg','.mpeg'}
          videos     = [f for f in files if f.suffix.lower() in video_exts]
          print(f"  Ficheiros descarregados: {len(files)}")
          for v in videos:
            print(f"  → Vídeo: {v} ({v.stat().st_size // (1024*1024)} MB)")
          if not videos:
            print('⚠ Nenhum vídeo encontrado no torrent')
            for f in files:
              print(f'  {f} ({f.stat().st_size} bytes)')
          PYEOF
          else
            echo "→ Modo URL directa (curl)"
            curl -L --retry 3 --retry-delay 5 --progress-bar --fail \
              -o "$WORK_DIR/incoming/input.video" \
              "$URL"
            SIZE=$(stat -c%s "$WORK_DIR/incoming/input.video" 2>/dev/null || echo 0)
            echo "✓ Download: $(du -sh $WORK_DIR/incoming/input.video | cut -f1) ($SIZE bytes)"
            if [ "$SIZE" -lt 10000 ]; then
              echo "⚠ Ficheiro demasiado pequeno — download falhou"
              cat "$WORK_DIR/incoming/input.video" || true
              exit 1
            fi
          fi
        env:
          video_url_env:    ${{ inputs.video_url }}
          FILE_INDICES_ENV: ${{ inputs.file_indices }}

      - name: '[Modo B] Obter vídeo via Artifact'
        if: ${{ inputs.video_url == '' }}
        uses: actions/download-artifact@v4
        with:
          name: video-${{ inputs.job_id }}
          path: ${{ env.WORK_DIR }}/incoming/

      - name: Detectar ficheiro de vídeo (+ extrair .rar/.zip se necessário)
        run: |
          VIDEO_EXTS="mp4 mkv avi mov wmv flv ts m4v webm mpg mpeg video"

          FILE_INDICES="${{ inputs.file_indices }}"
          if [ -n "$FILE_INDICES" ]; then
            echo "→ Modo worker | file_indices: $FILE_INDICES"
            echo "FILE_INDICES_ACTIVE=true" >> $GITHUB_ENV
          else
            echo "FILE_INDICES_ACTIVE=false" >> $GITHUB_ENV
          fi

          find_video() {
            for ext in $VIDEO_EXTS; do
              FOUND=$(find "$WORK_DIR/incoming/" -iname "*.${ext}" | head -1)
              if [ -n "$FOUND" ]; then echo "$FOUND"; return; fi
            done
          }

          VIDEO_PATH=$(find_video)

          if [ -z "$VIDEO_PATH" ]; then
            echo "Nenhum vídeo directo — procurando arquivos comprimidos..."
            RAR_FILES=$(find "$WORK_DIR/incoming/" -iname "*.rar" | head -1)
            ZIP_FILES=$(find "$WORK_DIR/incoming/" -iname "*.zip" | head -1)
            TAR_FILES=$(find "$WORK_DIR/incoming/" -iname "*.tar*" | head -1)

            if [ -n "$RAR_FILES" ]; then
              echo "→ Encontrado .rar: $RAR_FILES"
              sudo apt-get install -y --no-install-recommends unrar-free 2>/dev/null || \
              sudo apt-get install -y --no-install-recommends unrar 2>/dev/null || true
              EXTRACT_DIR="$WORK_DIR/incoming/extracted"
              mkdir -p "$EXTRACT_DIR"
              if command -v unrar &>/dev/null; then
                unrar x -o+ "$RAR_FILES" "$EXTRACT_DIR/" && echo "✓ unrar concluído"
              elif command -v unrar-free &>/dev/null; then
                unrar-free -x "$RAR_FILES" "$EXTRACT_DIR/" && echo "✓ unrar-free concluído"
              else
                echo "  unrar não disponível — tentando bsdtar"
                bsdtar -x -f "$RAR_FILES" -C "$EXTRACT_DIR/" && echo "✓ bsdtar concluído"
              fi
              VIDEO_PATH=$(find_video)
            elif [ -n "$ZIP_FILES" ]; then
              echo "→ Encontrado .zip: $ZIP_FILES"
              EXTRACT_DIR="$WORK_DIR/incoming/extracted"
              mkdir -p "$EXTRACT_DIR"
              unzip -o "$ZIP_FILES" -d "$EXTRACT_DIR/"
              VIDEO_PATH=$(find_video)
            elif [ -n "$TAR_FILES" ]; then
              echo "→ Encontrado .tar: $TAR_FILES"
              EXTRACT_DIR="$WORK_DIR/incoming/extracted"
              mkdir -p "$EXTRACT_DIR"
              tar -xf "$TAR_FILES" -C "$EXTRACT_DIR/"
              VIDEO_PATH=$(find_video)
            fi
          fi

          if [ -z "$VIDEO_PATH" ]; then
            echo "ERRO: nenhum vídeo encontrado após extracção"
            find "$WORK_DIR/incoming/" -type f | head -20
            exit 1
          fi

          echo "VIDEO_PATH=$VIDEO_PATH" >> $GITHUB_ENV
          echo "✓ Vídeo: $VIDEO_PATH ($(du -sh "$VIDEO_PATH" | cut -f1))"

      # ── 4. Probe ───────────────────────────────────────────────────────────
      - name: Probe do vídeo
        run: |
          ffprobe -v quiet -print_format json \
            -show_streams -show_format "$VIDEO_PATH" \
            > "$WORK_DIR/probe.json"
          python3 << 'PYEOF'
          import json, os
          d   = json.load(open(os.environ['WORK_DIR'] + '/probe.json'))
          vs  = next((s for s in d['streams'] if s['codec_type'] == 'video'), {})
          fmt = d['format']
          num, den = map(int, vs.get('r_frame_rate','24/1').split('/'))
          fps       = num / den if den else num
          src_codec = vs.get('codec_name', 'unknown')
          probe = {
            'duration': float(fmt.get('duration', 0)),
            'width':    vs.get('width',  1920),
            'height':   vs.get('height', 1080),
            'codec':    src_codec,
            'fps':      fps,
            'bitrate':  int(fmt.get('bit_rate', 0)),
            'size':     int(fmt.get('size', 0)),
          }
          json.dump(probe, open(os.environ['WORK_DIR'] + '/probe_parsed.json','w'))
          max_h      = int(os.environ['MAX_H'])
          eff_h      = min(probe['height'], max_h)
          will_scale = probe['height'] > max_h
          eff_w      = round((probe['width'] / probe['height']) * eff_h / 2) * 2 if will_scale else probe['width']
          h          = eff_h
          label = ('4k'    if h>=2160 else
                   '1440p' if h>=1440 else
                   '1080p' if h>=1080 else
                   '720p'  if h>=720  else
                   '480p'  if h>=480  else
                   '360p'  if h>=360  else f'{h}p')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
            f.write(f"PROBE_DURATION={probe['duration']}\n")
            f.write(f"PROBE_WIDTH={probe['width']}\n")
            f.write(f"PROBE_HEIGHT={probe['height']}\n")
            f.write(f"PROBE_CODEC={probe['codec']}\n")
            f.write(f"PROBE_FPS={fps}\n")
            f.write(f"PROBE_BITRATE={probe['bitrate']}\n")
            f.write(f"EFF_HEIGHT={eff_h}\n")
            f.write(f"EFF_WIDTH={eff_w}\n")
            f.write(f"WILL_SCALE={'true' if will_scale else 'false'}\n")
            f.write(f"QUALITY_LABEL={label}\n")
          print(f"✓ {probe['width']}x{probe['height']} | codec: {src_codec} | {fps:.2f}fps | {probe['duration']:.1f}s")
          print(f"  → encode {eff_w}x{eff_h} ({label}) | rescale: {will_scale}")
          PYEOF

      # ── 5. HLS encode — fMP4 ──────────────────────────────────────────────
      - name: HLS encode (fMP4 + libx264 superfast CRF26 + AAC 128k)
        run: |
          HLS_DIR="$WORK_DIR/hls"
          if [ "$WILL_SCALE" = "true" ]; then
            SCALE_ARGS="-vf scale=-2:${EFF_HEIGHT}"
          else
            SCALE_ARGS=""
          fi
          GOP=$(python3 -c "import math; print(int(math.ceil(${PROBE_FPS} * ${SEG_DURATION})))")
          echo "  GOP=$GOP frames (${PROBE_FPS}fps × ${SEG_DURATION}s)"
          echo "  Re-encode para h264 (codec entrada: ${PROBE_CODEC}) — compatibilidade universal"
          ffmpeg -hide_banner -loglevel warning -stats \
            -i "$VIDEO_PATH" \
            $SCALE_ARGS \
            -c:v libx264 -preset superfast -crf 26 -tune fastdecode \
            -profile:v high -level 4.0 \
            -pix_fmt yuv420p \
            -g $GOP -keyint_min ${SEG_DURATION} \
            -c:a aac -b:a 128k -ac 2 \
            -f hls \
            -hls_time ${SEG_DURATION} \
            -hls_playlist_type vod \
            -hls_segment_type fmp4 \
            -hls_fmp4_init_filename "init.mp4" \
            -hls_flags independent_segments \
            -hls_segment_filename "$HLS_DIR/seg%05d.m4s" \
            -y "$HLS_DIR/index.m3u8"
          echo "✓ $(ls $HLS_DIR/*.m4s | wc -l) segmentos .m4s gerados (fMP4 h264)"
          echo "✓ init.mp4: $(du -sh $HLS_DIR/init.mp4 | cut -f1)"

      # ── 6. Thumbnails ──────────────────────────────────────────────────────
      - name: Obter thumbnails
        env:
          INPUT_THUMBNAIL_URL: ${{ inputs.thumbnail_url }}
        run: |
          python3 << 'PYEOF'
          import subprocess, os, json

          thumb_dir = os.environ['WORK_DIR'] + '/thumbs'
          duration  = float(os.environ['PROBE_DURATION'])
          video     = os.environ['VIDEO_PATH']
          thumb_url = os.environ.get('INPUT_THUMBNAIL_URL', '').strip()
          thumbs    = []

          def is_valid_image(path, min_bytes=5000):
            if not os.path.exists(path): return False
            if os.path.getsize(path) < min_bytes: return False
            with open(path, 'rb') as f:
              h = f.read(12)
            return (
              h[:3] == b'\xff\xd8\xff' or
              h[:4] == b'\x89PNG' or
              h[:4] == b'RIFF' or
              h[:6] in (b'GIF87a', b'GIF89a') or
              h[:2] == b'BM' or
              h[:4] in (b'II*\x00', b'MM\x00*') or
              h[:4] in (b'\x00\x00\x00\x18', b'\x00\x00\x00\x1c',
                        b'\x00\x00\x00\x20') or
              (len(h) >= 8 and h[4:8] == b'ftyp')
            )

          def extract_frame(video, out_path, time_pct=0.07):
            t = max(1.0, duration * time_pct)
            r = subprocess.run([
              'ffmpeg', '-hide_banner', '-loglevel', 'error',
              '-ss', f'{t:.2f}', '-i', video,
              '-vframes', '1', '-vf', 'scale=1280:-2', '-q:v', '2',
              '-y', out_path,
            ], capture_output=True)
            return r.returncode == 0 and is_valid_image(out_path)

          if thumb_url:
            out = f"{thumb_dir}/thumb_0.jpg"
            print(f"  Descarregando thumbnail: {thumb_url}")
            subprocess.run([
              'curl', '-L', '--retry', '5', '--retry-delay', '3', '--max-time', '60',
              '-H', 'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              '-H', 'Accept: image/avif,image/webp,image/apng,image/*,*/*;q=0.8',
              '-H', 'Accept-Language: pt-BR,pt;q=0.9,en;q=0.8',
              '-H', 'Sec-Fetch-Dest: image',
              '-H', 'Sec-Fetch-Mode: no-cors',
              '-H', 'Sec-Fetch-Site: cross-site',
              '-o', out, thumb_url,
            ], capture_output=True)
            if not is_valid_image(out):
              if os.path.exists(out): os.remove(out)
              subprocess.run([
                'wget', '--timeout=30', '--tries=5',
                '--user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
                '-O', out, thumb_url,
              ], capture_output=True)
            if is_valid_image(out):
              norm = f"{thumb_dir}/thumb_0_norm.jpg"
              subprocess.run([
                'ffmpeg', '-hide_banner', '-loglevel', 'error',
                '-i', out, '-vframes', '1', '-q:v', '2',
                '-vf', "scale='min(1280,iw)':-2", '-y', norm,
              ], capture_output=True)
              if is_valid_image(norm): os.replace(norm, out)
              thumbs.append({'path': out, 'time': 0, 'index': 0})
              print(f"✓ Thumbnail válida ({os.path.getsize(out)//1024} KB)")
            else:
              if os.path.exists(out): os.remove(out)
              print(f"⚠ Thumbnail inválida — extraindo frame do vídeo")
              if extract_frame(video, out):
                thumbs.append({'path': out, 'time': 0, 'index': 0})
                print(f"✓ Frame extraído como fallback: {os.path.getsize(out)//1024} KB")
              else:
                print('✗ Falha ao extrair frame de fallback')
          else:
            out = f"{thumb_dir}/thumb_0.jpg"
            print(f"  Extraindo frame a 7% ({duration*0.07:.1f}s)")
            if extract_frame(video, out, time_pct=0.07):
              thumbs.append({'path': out, 'time': duration*0.07, 'index': 0})
              print(f"✓ Frame extraído: {os.path.getsize(out)//1024} KB")
            elif extract_frame(video, out, time_pct=0.05):
              thumbs.append({'path': out, 'time': duration*0.05, 'index': 0})
              print(f"✓ Frame extraído a 5%: {os.path.getsize(out)//1024} KB")
            else:
              print('✗ Não foi possível extrair frame')

          json.dump(thumbs, open(os.environ['WORK_DIR'] + '/thumbs_manifest.json', 'w'))
          print(f"✓ {len(thumbs)} thumbnail(s)")
          PYEOF

      # ── 7. Encriptar init.mp4 + segmentos .m4s → .bin (chunk format v2) ───
      - name: Encriptar segmentos → .bin
        run: |
          python3 << 'PYEOF'
          import os, json, secrets, struct
          from cryptography.hazmat.primitives.ciphers import Cipher, algorithms
          key_hex = os.environ['CHACHA_KEY']
          if len(key_hex) != 64:
            raise ValueError('CHACHA_KEY inválido')
          key     = bytes.fromhex(key_hex)
          hls_dir = os.environ['WORK_DIR'] + '/hls'
          CHUNK_SIZE = 65536

          def encrypt_segment(data, key):
            chunks = [data[i:i+CHUNK_SIZE] for i in range(0, len(data), CHUNK_SIZE)]
            out    = [struct.pack('<I', len(chunks))]
            for chunk in chunks:
              nonce       = secrets.token_bytes(12)
              nonce_field = struct.pack('<I', 1) + nonce
              ct          = Cipher(algorithms.ChaCha20(key, nonce_field), None).encryptor().update(chunk)
              out.append(nonce)
              out.append(struct.pack('<I', len(ct)))
              out.append(ct)
            return b''.join(out)

          nonce_map = {}
          init_src  = os.path.join(hls_dir, 'init.mp4')
          init_dst  = os.path.join(hls_dir, 'init.bin')
          if os.path.exists(init_src):
            with open(init_src, 'rb') as f: data = f.read()
            encrypted = encrypt_segment(data, key)
            with open(init_dst, 'wb') as f: f.write(encrypted)
            os.remove(init_src)
            n_chunks = struct.unpack('<I', encrypted[:4])[0]
            nonce_map['init.bin'] = f'chunked:{n_chunks}'
            print(f"  init.mp4 → init.bin ({len(data)//1024}KB → {n_chunks} chunks)")

          seg_files = sorted(f for f in os.listdir(hls_dir) if f.endswith('.m4s'))
          if not seg_files: raise RuntimeError('Nenhum .m4s encontrado')

          for fname in seg_files:
            src      = os.path.join(hls_dir, fname)
            bin_name = fname.replace('.m4s', '.bin')
            dst      = os.path.join(hls_dir, bin_name)
            with open(src, 'rb') as f: data = f.read()
            encrypted = encrypt_segment(data, key)
            with open(dst, 'wb') as f: f.write(encrypted)
            os.remove(src)
            n_chunks = struct.unpack('<I', encrypted[:4])[0]
            nonce_map[bin_name] = f'chunked:{n_chunks}'
            print(f"  {fname} → {bin_name} ({len(data)//1024}KB → {n_chunks} chunks)")

          out = {'key_id': os.environ['CHACHA_KEY'][:8], 'format': 'chunk-v2', 'nonces': nonce_map}
          json.dump(out, open(os.environ['WORK_DIR'] + '/nonces.json','w'))
          print(f"✓ {len(seg_files)} segmentos + init encriptados (chunk-v2, fMP4)")
          PYEOF

      # ── 7b. Dividir .bin maiores que 1.9 GB em partes (limite Release = 2 GB) ─
      - name: Dividir ficheiros .bin > 1.9GB em partes
        run: |
          python3 << 'PYEOF'
          import os, json

          hls_dir    = os.environ['WORK_DIR'] + '/hls'
          SPLIT_SIZE = int(1.9 * 1024 * 1024 * 1024)
          split_map  = {}

          for fname in sorted(os.listdir(hls_dir)):
            if not fname.endswith('.bin'):
              continue
            fpath = os.path.join(hls_dir, fname)
            size  = os.path.getsize(fpath)
            if size <= SPLIT_SIZE:
              continue

            print(f"  ⚠ {fname} ({size/(1024**3):.2f}GB) excede limite — dividindo...")
            n_parts = 0
            with open(fpath, 'rb') as src:
              part_idx = 0
              while True:
                chunk = src.read(SPLIT_SIZE)
                if not chunk:
                  break
                part_name = f"{fname}.part{part_idx:03d}"
                with open(os.path.join(hls_dir, part_name), 'wb') as dst:
                  dst.write(chunk)
                part_idx += 1
                n_parts += 1

            os.remove(fpath)
            split_map[fname] = n_parts
            print(f"    → {n_parts} partes ({fname}.part000 .. {fname}.part{n_parts-1:03d})")

          manifest_path = os.environ['WORK_DIR'] + '/split_manifest.json'
          json.dump(split_map, open(manifest_path, 'w'))

          if split_map:
            print(f"✓ {len(split_map)} ficheiro(s) dividido(s): {split_map}")
          else:
            print("✓ Nenhum ficheiro excede o limite — split não necessário")
          PYEOF

      # ── 8. Reescrever index.m3u8 com URLs CDN ─────────────────────────────
      - name: Reescrever index.m3u8 com URLs CDN
        run: |
          python3 << 'PYEOF'
          import re, os
          hls_dir  = os.environ['WORK_DIR'] + '/hls'
          cdn_base = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id   = os.environ['JOB_ID']
          with open(hls_dir + '/index.m3u8') as f:
            content = f.read()
          content = re.sub(
            r'#EXT-X-MAP:URI="init\.mp4"',
            f'#EXT-X-MAP:URI="{cdn_base}/{job_id}/hls/init.bin"',
            content
          )
          content = re.sub(
            r'^(seg\d+)\.m4s$',
            lambda m: f"{cdn_base}/{job_id}/hls/{m.group(1)}.bin",
            content, flags=re.MULTILINE
          )
          with open(hls_dir + '/index.m3u8', 'w') as f:
            f.write(content)
          print(f"✓ index.m3u8 reescrito → {cdn_base}/{job_id}/hls/")
          PYEOF

      # ── 9. Gerar master.m3u8 ──────────────────────────────────────────────
      - name: Gerar master.m3u8
        run: |
          python3 << 'PYEOF'
          import os, json
          cdn_base  = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id    = os.environ['JOB_ID']
          work_dir  = os.environ['WORK_DIR']
          eff_w     = os.environ['EFF_WIDTH']
          eff_h     = os.environ['EFF_HEIGHT']
          hls_dir   = work_dir + '/hls'
          bin_files = sorted(f for f in os.listdir(hls_dir) if f.endswith('.bin') and f != 'init.bin')
          if bin_files:
            total_bytes  = sum(os.path.getsize(os.path.join(hls_dir, f)) for f in bin_files)
            seg_dur      = int(os.environ['SEG_DURATION'])
            duration_s   = len(bin_files) * seg_dur
            real_bitrate = int((total_bytes * 8) / duration_s) if duration_s > 0 else 2000000
          else:
            real_bitrate = int(os.environ.get('PROBE_BITRATE') or 2000000)
          master = '\n'.join([
            '#EXTM3U',
            '#EXT-X-VERSION:6',
            '',
            f'#EXT-X-STREAM-INF:BANDWIDTH={real_bitrate},RESOLUTION={eff_w}x{eff_h}',
            f'{cdn_base}/{job_id}/hls/index.m3u8',
          ])
          with open(work_dir + '/master.m3u8', 'w') as f:
            f.write(master)
          print(f"✓ master.m3u8: {eff_w}x{eff_h} | {real_bitrate}bps (EXT-X-VERSION:6 fMP4)")
          print(f"  → CDN: {cdn_base}/{job_id}/master.m3u8")
          PYEOF

      # ── 10. Gerar cdn_urls.json ────────────────────────────────────────────
      - name: Gerar cdn_urls.json
        run: |
          python3 << 'PYEOF'
          import os, json
          work_dir = os.environ['WORK_DIR']
          cdn_base = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id   = os.environ['JOB_ID']

          nonces = json.load(open(work_dir + '/nonces.json'))
          thumbs = json.load(open(work_dir + '/thumbs_manifest.json'))

          cdn_urls = (
            [
              f"{cdn_base}/{job_id}/master.m3u8",
              f"{cdn_base}/{job_id}/nonces.json",
              f"{cdn_base}/{job_id}/hls/index.m3u8",
              f"{cdn_base}/{job_id}/hls/init.bin",
            ] +
            [f"{cdn_base}/{job_id}/hls/{bn}" for bn in nonces['nonces'] if bn != 'init.bin'] +
            [f"{cdn_base}/{job_id}/thumbs/thumb_{i}.jpg" for i in range(len(thumbs))]
          )

          json.dump(cdn_urls, open(work_dir + '/cdn_urls.json', 'w'))
          print(f"✓ cdn_urls.json gerado: {len(cdn_urls)} URLs")
          PYEOF

      # ── 11. Criar Release(s) e upload assets ──────────────────────────────
      # GitHub limita 1000 assets por Release.
      # Estratégia: Release principal ({job_id}) recebe sempre os ficheiros de
      # metadados (master.m3u8, index.m3u8, nonces.json, split_manifest.json,
      # init.bin, thumb_*.jpg). Os segmentos .bin são distribuídos em chunks de
      # 990 por Release adicional ({job_id}-p2, {job_id}-p3, …) se necessário.
      # O CDN Worker serve todos os paths de {job_id}/* independentemente de
      # qual Release física contém cada asset — não há alteração nos cdn_urls.
      - name: Criar Release(s) e upload assets
        id: upload_assets
        continue-on-error: true
        env:
          STORAGE_TOKEN: ${{ secrets.STORAGE_GITHUB_TOKEN }}
          STORAGE_OWNER: ${{ secrets.STORAGE_GITHUB_OWNER }}
          STORAGE_REPO:  ${{ secrets.STORAGE_GITHUB_REPO }}
          METADATA:      ${{ inputs.metadata }}
        run: |
          python3 << 'PYEOF'
          import os, subprocess, sys, json, time
          work_dir      = os.environ['WORK_DIR']
          storage_token = os.environ['STORAGE_TOKEN']
          storage_owner = os.environ['STORAGE_OWNER']
          storage_repo  = os.environ['STORAGE_REPO']
          job_id        = os.environ['JOB_ID']
          quality       = os.environ['QUALITY_LABEL']
          github_env    = os.environ['GITHUB_ENV']

          # ── Limite seguro por Release (GitHub impõe 1000 hard) ─────────────
          ASSETS_PER_RELEASE = 990

          def gh_json(args):
            """Executa curl autenticado e devolve dict JSON ou {} em erro."""
            r = subprocess.run([
              'curl', '-sf',
              '-H', f'Authorization: Bearer {storage_token}',
              '-H', 'Accept: application/vnd.github+json',
              '-H', 'X-GitHub-Api-Version: 2022-11-28',
            ] + args, capture_output=True, text=True)
            if r.returncode != 0 or not r.stdout.strip():
              return {}
            try:
              return json.loads(r.stdout)
            except Exception:
              return {}

          def get_or_create_release(tag, title, body_text):
            """Cria Release com tag dada; se já existir devolve a existente."""
            data = gh_json([
              '-X', 'POST',
              f'https://api.github.com/repos/{storage_owner}/{storage_repo}/releases',
              '-d', json.dumps({
                'tag_name': tag,
                'name':     title,
                'body':     body_text,
                'draft':    False,
                'prerelease': False,
              }),
            ])
            if 'upload_url' in data:
              return data
            # 422 = tag já existe → buscar existente
            print(f"  ↺ Tag '{tag}' já existe — obtendo Release existente...")
            data2 = gh_json([
              f'https://api.github.com/repos/{storage_owner}/{storage_repo}/releases/tags/{tag}'
            ])
            return data2

          def delete_asset_if_exists(existing_assets, asset_name):
            if asset_name in existing_assets:
              print(f"  ↺ {asset_name} já existe — removendo antes de re-enviar...")
              subprocess.run([
                'curl', '-sf', '-X', 'DELETE',
                '-H', f'Authorization: Bearer {storage_token}',
                '-H', 'Accept: application/vnd.github+json',
                '-H', 'X-GitHub-Api-Version: 2022-11-28',
                f'https://api.github.com/repos/{storage_owner}/{storage_repo}/releases/assets/{existing_assets[asset_name]}',
              ], capture_output=True)
              # Aguardar confirmação da deleção (máx 10s)
              for _ in range(10):
                time.sleep(1)
                check = gh_json([
                  f'https://api.github.com/repos/{storage_owner}/{storage_repo}/releases/assets/{existing_assets[asset_name]}'
                ])
                if not check or 'id' not in check:
                  break  # asset já não existe

          def upload_asset(upload_url, file_path, asset_name, mime):
            size_kb = os.path.getsize(file_path) // 1024
            r = subprocess.run([
              'curl', '-sf', '-o', '/dev/null', '-w', '%{http_code}',
              '-X', 'POST',
              '-H', f'Authorization: Bearer {storage_token}',
              '-H', f'Content-Type: {mime}',
              '--max-time', '120',
              f'{upload_url}?name={asset_name}',
              '--data-binary', f'@{file_path}',
            ], capture_output=True, text=True)
            code = r.stdout.strip()
            if code == '201':
              print(f"  ✓ {asset_name} ({size_kb}KB)")
              return True
            else:
              print(f"  ✗ {asset_name} HTTP {code} — abortando")
              return False

          # ── Construir lista de assets ───────────────────────────────────────
          # Ordem: metadados fixos primeiro, depois segmentos .bin por ordem
          meta_assets = []
          for fpath, mime in [
            (os.path.join(work_dir, 'master.m3u8'),        'application/vnd.apple.mpegurl'),
            (os.path.join(work_dir, 'hls', 'index.m3u8'),  'application/vnd.apple.mpegurl'),
            (os.path.join(work_dir, 'nonces.json'),         'application/json'),
            (os.path.join(work_dir, 'split_manifest.json'), 'application/json'),
          ]:
            if os.path.exists(fpath):
              meta_assets.append((fpath, os.path.basename(fpath), mime))

          # init.bin e thumbnails também vão para a Release principal
          hls_dir   = os.path.join(work_dir, 'hls')
          thumb_dir = os.path.join(work_dir, 'thumbs')

          init_bin = os.path.join(hls_dir, 'init.bin')
          if os.path.exists(init_bin):
            meta_assets.append((init_bin, 'init.bin', 'application/octet-stream'))

          if os.path.isdir(thumb_dir):
            for f in sorted(f for f in os.listdir(thumb_dir) if f.endswith('.jpg')):
              meta_assets.append((os.path.join(thumb_dir, f), f, 'image/jpeg'))

          # Segmentos .bin (excluindo init.bin, já incluído acima)
          seg_assets = []
          for f in sorted(os.listdir(hls_dir)):
            if (f.endswith('.bin') or '.bin.part' in f) and f != 'init.bin':
              seg_assets.append((os.path.join(hls_dir, f), f, 'application/octet-stream'))

          total_mb = sum(os.path.getsize(p) for p, _, _ in meta_assets + seg_assets) / (1024 * 1024)
          print(f"  Total assets: {len(meta_assets) + len(seg_assets)} ficheiros | {total_mb:.1f} MB")
          print(f"  Meta/fixos: {len(meta_assets)} | Segmentos: {len(seg_assets)}")

          try:
            meta = json.loads(os.environ.get('METADATA', '{}'))
          except Exception:
            meta = {}
          title = meta.get('title', 'Untitled')

          # ── Calcular quantas Releases são necessárias ───────────────────────
          # Release p1 (tag = job_id): meta_assets + tantos seg_assets que caibam
          slots_p1    = ASSETS_PER_RELEASE - len(meta_assets)
          segs_p1     = seg_assets[:slots_p1]
          segs_remain = seg_assets[slots_p1:]

          # Releases adicionais p2, p3, … (tag = job_id-p2, job_id-p3, …)
          extra_chunks = []
          part_idx = 2
          while segs_remain:
            chunk        = segs_remain[:ASSETS_PER_RELEASE]
            segs_remain  = segs_remain[ASSETS_PER_RELEASE:]
            extra_chunks.append((f"{job_id}-p{part_idx}", chunk))
            part_idx += 1

          n_releases = 1 + len(extra_chunks)
          print(f"  Releases necessárias: {n_releases} (limite {ASSETS_PER_RELEASE}/Release)")

          all_ok = True

          # ── Release principal ───────────────────────────────────────────────
          print(f"\n→ Release principal: tag={job_id}")
          rel = get_or_create_release(
            job_id, title,
            f'jobId={job_id} | quality={quality} | parts={n_releases}'
          )
          if 'upload_url' not in rel:
            print(f"  ✗ Não foi possível criar/obter Release principal")
            with open(github_env, 'a') as f: f.write("UPLOAD_SKIP=true\n")
            sys.exit(0)

          upload_url_p1    = rel['upload_url'].split('{')[0]
          existing_p1      = {a['name']: a['id'] for a in rel.get('assets', [])}
          p1_assets        = meta_assets + segs_p1

          ok_p1 = 0
          for file_path, asset_name, mime in p1_assets:
            delete_asset_if_exists(existing_p1, asset_name)
            if not upload_asset(upload_url_p1, file_path, asset_name, mime):
              all_ok = False
              with open(github_env, 'a') as f: f.write("UPLOAD_SKIP=true\n")
              sys.exit(0)
            ok_p1 += 1
          print(f"  ✅ Release principal: {ok_p1}/{len(p1_assets)} assets")

          # ── Releases adicionais ─────────────────────────────────────────────
          for part_tag, chunk in extra_chunks:
            print(f"\n→ Release adicional: tag={part_tag} ({len(chunk)} segmentos)")
            rel_p = get_or_create_release(
              part_tag,
              f"{title} [{part_tag}]",
              f'jobId={job_id} | part={part_tag} | quality={quality}'
            )
            if 'upload_url' not in rel_p:
              print(f"  ✗ Não foi possível criar/obter Release {part_tag}")
              all_ok = False
              with open(github_env, 'a') as f: f.write("UPLOAD_SKIP=true\n")
              sys.exit(0)

            upload_url_p   = rel_p['upload_url'].split('{')[0]
            existing_p     = {a['name']: a['id'] for a in rel_p.get('assets', [])}
            ok_p = 0
            for file_path, asset_name, mime in chunk:
              delete_asset_if_exists(existing_p, asset_name)
              if not upload_asset(upload_url_p, file_path, asset_name, mime):
                all_ok = False
                with open(github_env, 'a') as f: f.write("UPLOAD_SKIP=true\n")
                sys.exit(0)
              ok_p += 1
            print(f"  ✅ {part_tag}: {ok_p}/{len(chunk)} assets")

          total_sent = ok_p1 + sum(len(c) for _, c in extra_chunks)
          print(f"\n✅ Upload completo: {total_sent}/{len(meta_assets)+len(seg_assets)} assets em {n_releases} Release(s)")
          with open(github_env, 'a') as f: f.write("UPLOAD_SKIP=false\n")
          PYEOF

      # ── 12. Registar no EdgeOne ────────────────────────────────────────────
      - name: Registar no EdgeOne (Turso + KV)
        env:
          METADATA:       ${{ inputs.metadata }}
          SEASON_NUMBER:  ${{ inputs.season_number }}
          EPISODE_NUMBER: ${{ inputs.episode_number }}
          EPISODE_TITLE:  ${{ inputs.episode_title }}
          FILE_INDICES:   ${{ inputs.file_indices }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, datetime, time

          pipeline_api = os.environ.get('PIPELINE_API','').rstrip('/')
          if not pipeline_api:
            print('⚠ PIPELINE_API não configurado — ignorado')
            exit(0)

          work_dir = os.environ['WORK_DIR']
          cdn_base = os.environ['CDN_DOMAIN'].rstrip('/')
          job_id   = os.environ['JOB_ID']
          quality  = os.environ['QUALITY_LABEL']
          seg_dur  = int(os.environ['SEG_DURATION'])
          eff_w    = int(os.environ['EFF_WIDTH'])
          eff_h    = int(os.environ['EFF_HEIGHT'])

          try:    metadata = json.loads(os.environ.get('METADATA','{}'))
          except: metadata = {}

          probe    = json.load(open(work_dir + '/probe_parsed.json'))
          nonces   = json.load(open(work_dir + '/nonces.json'))
          thumbs   = json.load(open(work_dir + '/thumbs_manifest.json'))
          cdn_urls = json.load(open(work_dir + '/cdn_urls.json'))

          content_id = metadata.get('contentId', job_id)
          seg_count  = len([k for k in nonces['nonces'] if k != 'init.bin'])
          thumb_urls = [f"{cdn_base}/{job_id}/thumbs/thumb_{i}.jpg" for i in range(len(thumbs))]

          body = {
            'contentId':    content_id,
            'title':        metadata.get('title','Untitled'),
            'description':  metadata.get('description',''),
            'type':         metadata.get('type','movie'),
            'year':         int(metadata.get('year') or datetime.datetime.now().year),
            'lang':         metadata.get('lang','en'),
            'duration':     round(probe['duration']),
            'thumbnail':    thumb_urls[0] if thumb_urls else '',
            'thumbnails':   thumb_urls,
            'qualities':    [quality],
            'width':        eff_w,
            'height':       eff_h,
            'codec':        'h264',
            'fps':          probe['fps'],
            'bitrate':      probe['bitrate'],
            'segmentCount': seg_count,
            'segDuration':  seg_dur,
            'videoID':      content_id,
            'cdnUrls':      cdn_urls,
            'encrypted':    True,
            'encryption':   'chacha20-chunk-v2',
            'container':    'fmp4',
            'segExt':       'bin',
            'masterUrl':    f"{cdn_base}/{job_id}/master.m3u8",
            'noncesUrl':    f"{cdn_base}/{job_id}/nonces.json",
          }

          payload      = json.dumps(body).encode()
          MAX_ATTEMPTS = 5
          BACKOFF      = [5, 10, 20, 40]

          for attempt in range(1, MAX_ATTEMPTS + 1):
            req = urllib.request.Request(
              f"{pipeline_api}/api/pipeline/register",
              data=payload,
              headers={
                'Content-Type': 'application/json',
                'X-API-Key':    os.environ.get('ADMIN_API_KEY',''),
              },
              method='POST'
            )
            try:
              with urllib.request.urlopen(req, timeout=30) as r:
                print(f"✓ Conteúdo registado ({r.status}) na tentativa {attempt}")
                break
            except urllib.error.HTTPError as e:
              body_err = e.read().decode()[:300]
              print(f"⚠ Tentativa {attempt}/{MAX_ATTEMPTS} — HTTP {e.code}: {body_err}")
              if e.code < 500 and e.code != 429:
                print(f"  Erro de cliente ({e.code}) — sem retry")
                break
            except Exception as e:
              print(f"⚠ Tentativa {attempt}/{MAX_ATTEMPTS} — {e}")
            if attempt < MAX_ATTEMPTS:
              wait = BACKOFF[attempt - 1]
              print(f"  Aguardando {wait}s...")
              time.sleep(wait)
            else:
              print(f"✗ Registo falhou após {MAX_ATTEMPTS} tentativas")

          content_type  = metadata.get('type', 'movie')
          season_num    = int(os.environ.get('SEASON_NUMBER', '0') or '0')
          episode_nums  = os.environ.get('EPISODE_NUMBER', '').strip()
          episode_title = os.environ.get('EPISODE_TITLE', '').strip()
          file_indices  = os.environ.get('FILE_INDICES', '').strip()
          IS_SERIES     = content_type in ('series', 'anime', 'dorama') and season_num > 0 and file_indices != ''

          if IS_SERIES:
            episode_list = [int(x) for x in episode_nums.split(',') if x.strip().isdigit()]
            print(f"\n→ Registando série: contentId={content_id} | S{season_num:02d} | eps={episode_list}")

            def api_call(endpoint, body_dict, label):
              payload_s = json.dumps(body_dict).encode()
              for attempt in range(1, 4):
                req_s = urllib.request.Request(
                  f"{pipeline_api}{endpoint}",
                  data=payload_s,
                  headers={'Content-Type': 'application/json', 'X-API-Key': os.environ.get('ADMIN_API_KEY','')},
                  method='POST'
                )
                try:
                  with urllib.request.urlopen(req_s, timeout=30) as r:
                    resp = json.loads(r.read().decode())
                    print(f"  ✓ {label} ({r.status})")
                    return resp
                except urllib.error.HTTPError as e:
                  body_e = e.read().decode()[:200]
                  if e.code == 409:
                    print(f"  ℹ {label} já existe (409) — ok")
                    return {'ok': True, 'exists': True}
                  print(f"  ⚠ {label} tentativa {attempt} HTTP {e.code}: {body_e}")
                  if e.code < 500: break
                except Exception as e:
                  print(f"  ⚠ {label} tentativa {attempt}: {e}")
                time.sleep(3)
              return None

            api_call('/api/admin/season', {
              'content_id':    content_id,
              'season_number': season_num,
              'title':         f"Temporada {season_num}",
            }, f"Season {season_num}")

            for ep_num in episode_list:
              api_call('/api/admin/episode', {
                'content_id':     content_id,
                'season_number':  season_num,
                'episode_number': ep_num,
                'title':          episode_title or f"Episódio {ep_num}",
                'duration':       round(probe['duration']),
              }, f"Ep {ep_num}")

            print(f"  ✅ Season + {len(episode_list)} episódio(s) registados")
          PYEOF

      # ── 12b. Notificar dispatcher (webhook FIFO) ───────────────────────────
      - name: Notificar dispatcher (webhook FIFO)
        if: always()
        run: |
          if [ -z "$PIPELINE_API" ]; then
            echo "⚠ PIPELINE_API não configurado — webhook ignorado"
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            WEBHOOK_STATUS="done"
          else
            WEBHOOK_STATUS="failed"
          fi

          WEBHOOK_URL="$(echo "$PIPELINE_API" | sed 's|/api/.*||; s|/$||')/webhook"

          echo "→ POST ${WEBHOOK_URL} job_id=${JOB_ID} status=${WEBHOOK_STATUS}"

          HTTP_CODE=$(curl -s -o /tmp/wh_resp.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${ADMIN_API_KEY}" \
            --max-time 20 \
            --retry 3 \
            --retry-delay 5 \
            "${WEBHOOK_URL}" \
            -d "{\"job_id\":\"${JOB_ID}\",\"status\":\"${WEBHOOK_STATUS}\"}")

          echo "  HTTP ${HTTP_CODE}: $(cat /tmp/wh_resp.txt)"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Slot libertado — próximo job na fila será despachado"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "ℹ Job não encontrado no dispatcher (job manual ou expirado) — ok"
          else
            echo "⚠ Webhook falhou (HTTP ${HTTP_CODE}) — slot libertado pelo watchdog em ~360min"
          fi

      # ── 13. Cleanup ────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        run: |
          rm -rf "$WORK_DIR"
          rm -f /tmp/wh_resp.txt
          echo "✓ Workspace limpo"
